  <!-- 2. ANIMATION STAGE — sits on top, z-index 10 -->

    <img id="frame-img" src="" alt="Animation frame" />
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="hint-line"></div>
    </div>
    <div id="anim-progress"><div id="anim-progress-fill"></div></div>
  </div>

    <section id="main-Container">
      <div id="home-Container">

        <h1 class="opening-Pagetext">Naledi Sithole </h1>
        <h1 class="opening-Pagetext1">Portfolio</h1>

        <div class="inner-Card1">
          <p>Developer,<br>Designer &amp;<br>Digital Marketer</p>
        </div>

        <div></div>

        <div class="inner-Card2">
          <p>Design,<br>Development<br>&amp; Digital Art</p>
        </div>

        <div class="inner-Card3">
          <p class="innercard3-text">Tools I am knowledgeable in</p>
          <div style="margin-top: 0.5rem;">

          <p style="font-family: 'Syne', sans-serif; font-size: 0.78rem; line-height: 1.7; text-transform: none; color: rgba(240,230,211,0.55);">
            Welcome to my portfolio. A showcase of my skills, projects, and experiences in design, development and digital art.
