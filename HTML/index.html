<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naledi Sithole — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/CSS/main.css" />
  <script src="/JS/interaction.js" defer></script>
</head>
<body>

  <header class="site-header" id="site-header">
    <div class="logo">
      <span class="logo-mark">NS</span>
      <span class="logo-wordmark">Naledi Sithole</span>
    </div>
    <nav class="site-nav">
      <a href="#2DIllustrations">2D Illustrations</a>
      <a href="#about">About</a>
      <a href="#3DIllustrations">3D Illustrations</a>
    </nav>
  </header>

  <div id="anim-stage">
    <img id="frame-img" src="" alt="Animation frame" />
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="hint-line"></div>
    </div>
    <div id="anim-progress"><div id="anim-progress-fill"></div></div>
  </div>

  <!-- FRAME STORE — hidden, browser preloads images, JS reads src from here -->
  <section id="frame-store">
    <div class="imgs"><img class="anim-frame" src="/IMGS/1.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/2.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/3.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/4.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/5.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/6.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/7.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/8.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/9.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/10.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/11.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/12.png" alt="" /></div>
    <div class="imgs"><img class="anim-frame" src="/IMGS/13.png" alt="" /></div>
  </section>

  <section class="hero-section" id="hero-section">
    <div class="hero-noise"></div>
    <div class="hero-inner">
      <div class="inner-badge2">
        <span class="badge-dot"></span>
        <h5 class="card2-text">Young Talented Creative</h5>
      </div>
      <h1 class="hero-section-heading">
        <span class="heading-line">Portfolio</span>
        <span class="heading-line">Website</span>
      </h1>
      <div class="inner-badge1">
        <h5 class="card1-text">Designs, Development &amp; Digital Art</h5>
      </div>
      <div class="hero-scroll-cta">
        <span>Explore work</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8l6 6 6-6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </section>

  <section class="BrandRecall-Clientwork">
    <div class="homepage-section1">
    <button class="section1-btn"></button>
      

    </div>
  </section>

   <section class="Adidas-Campaign">
    <div class="homepage-section2">
    <button class="section2-btn"></button>
      

    </div>
  </section>
